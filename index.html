<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamentos do Guinho</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:650px;
    padding:15px;
}

.header{
    text-align:center;
    margin-bottom:15px;
}

.header h1{
    margin:0;
    font-size:1.8rem;
}

.online{
    font-size:0.8rem;
    color:#7CFC00;
}

.card{
    background: rgba(255,255,255,0.08);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    backdrop-filter: blur(10px);
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:10px;
    cursor:pointer;
}

.btn-primary{background:#00c6ff;color:#000;}
.btn-secondary{background:#ffcc00;color:#000;}
.btn-success{background:#00ff88;color:#000;}

.grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
}

.num{
    width:45px;
    height:45px;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.num.active{
    background:#00ff88;
}

.results{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(100px,1fr));
    gap:8px;
}

.ticket{
    background:#fff;
    color:#000;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}

.ticket.win{
    background:#00ff88;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <h1>🔥 Fechamentos do Guinho</h1>
    <div class="online">● <span id="online">120</span> pessoas online</div>
</div>

<div class="card">
    <button class="btn btn-primary">🤝 Doação</button>
    <button class="btn btn-secondary">🎰 Jogar Agora</button>
</div>

<div class="card" style="text-align:center">
    <h3 id="date"></h3>
    <h2 id="clock"></h2>
</div>

<div class="card">
    <div class="grid" id="grid"></div>
</div>

<div class="card">
    <select id="mode" class="btn">
        <option value="2-7">7 dezenas</option>
        <option value="2-8">8 dezenas</option>
    </select>
    <button class="btn btn-success" onclick="generate()">GERAR</button>
</div>

<div class="card results" id="results"></div>

</div>

<script>
let selected=[];
let games=[];

function render(){
    let grid=document.getElementById('grid');
    grid.innerHTML='';
    for(let i=0;i<=9;i++){
        let b=document.createElement('button');
        b.innerText=i;
        b.className='num';
        b.onclick=()=>{
            let idx=selected.indexOf(i);
            if(idx>-1){selected.splice(idx,1);b.classList.remove('active');}
            else{selected.push(i);b.classList.add('active');}
        }
        grid.appendChild(b);
    }
}

function combine(arr,k){
    let res=[];
    function helper(start,combo){
        if(combo.length===k){res.push([...combo]);return;}
        for(let i=start;i<arr.length;i++){
            combo.push(arr[i]);
            helper(i+1,combo);
            combo.pop();
        }
    }
    helper(0,[]);
    return res;
}

function generate(){
    let k=parseInt(document.getElementById('mode').value.split('-')[0]);
    games=combine(selected,k);
    let html=games.map(g=>`<div class='ticket'>${g.join('-')}</div>`).join('');
    document.getElementById('results').innerHTML=html;
}

function clock(){
    let d=new Date();
    document.getElementById('date').innerText=d.toLocaleDateString();
    document.getElementById('clock').innerText=d.toLocaleTimeString();
}
setInterval(clock,1000);

function online(){
    document.getElementById('online').innerText=100+Math.floor(Math.random()*50);
    setTimeout(online,5000);
}

render();
clock();
online();
</script>

</body>
</html>
