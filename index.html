<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fechamentos Do Guinho</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --whatsapp: #25D366;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --win-blue: #007bff;
            --gold: #f1c40f;
            --mercadopago: #009ee3;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-card { background: white; width: 100%; max-width: 600px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 1.5rem; }
        
        /* Contador de Pessoas Online */
        .online-counter { font-size: 0.75rem; color: #a5d6a7; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background-color: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .content { padding: 15px; }
        .donate-section { margin-bottom: 15px; text-align: center; }
        .btn-donate { 
            background: var(--mercadopago); color: white; text-decoration: none; 
            padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .suggestions-panel { 
            background: linear-gradient(135deg, #2c3e50, #4ca1af); 
            color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; 
            text-align: center; border: 2px solid var(--gold);
        }
        .clock-display { font-family: monospace; font-size: 1.2rem; color: var(--gold); margin-bottom: 10px; font-weight: bold; background: rgba(0,0,0,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .suggestion-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; font-weight: bold; font-family: monospace; }
        .sug-item { background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px; font-size: 1rem; }

        .puxada-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .puxada-panel select { background: white; margin-top: 5px; width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        #puxada-resultado { font-weight: bold; color: #856404; margin-top: 8px; font-size: 0.9rem; text-align: center; }

        .number-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .num-btn { 
            flex: 1 1 calc(20% - 10px); min-width: 50px; max-width: 60px; height: 50px; 
            border: 2px solid #ddd; border-radius: 10px; background: white; font-size: 1.3rem; font-weight: bold; cursor: pointer; 
        }
        .num-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        .panel { background: var(--light); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        select, input, button.main-btn { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; width: 100%; box-sizing: border-box; }
        button.main-btn { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.main-btn:disabled { background: #bdc3c7; }
        
        .action-buttons { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 0.9rem; width: 100%; }

        #results-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 20px; }
        .ticket { background: #fff; border: 1px solid #dee2e6; padding: 10px; text-align: center; border-radius: 8px; font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .ticket.ganhador { background: var(--win-blue) !important; color: white !important; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>Fechamentos Do Guinho</h1>
        <div class="online-counter">
            <span class="dot"></span> <span id="user-count">Carregando...</span> pessoas online agora
        </div>
    </div>

    <div class="content">
        <div class="donate-section">
            <a href="https://mpago.la/2Hvokm3" target="_blank" class="btn-donate">🤝 Manter o site ativo</a>
        </div>

        <div class="suggestions-panel">
            <div id="clock" class="clock-display">00:00:00</div>
            <h3 style="font-size:0.8rem">✨ PALPITES DIÁRIOS (00H)</h3>
            <div id="palpites-milhar" class="suggestion-group" style="margin-bottom: 8px;"></div>
            <div id="palpites-centena" class="suggestion-group"></div>
        </div>

        <div class="puxada-panel">
            <label style="font-size: 0.8rem; font-weight: bold;">🔎 O QUE DEU? (VER PUXADA):</label>
            <select id="bichoAnterior" onchange="verPuxada()">
                <option value="">Selecione o Bicho...</option>
                <option value="Avestruz (1)">Avestruz (1)</option>
                <option value="Águia (2)">Águia (2)</option>
                <option value="Burro (3)">Burro (3)</option>
                <option value="Borboleta (4)">Borboleta (4)</option>
                <option value="Cachorro (5)">Cachorro (5)</option>
                <option value="Cabra (6)">Cabra (6)</option>
                <option value="Carneiro (7)">Carneiro (7)</option>
                <option value="Camelo (8)">Camelo (8)</option>
                <option value="Cobra (9)">Cobra (9)</option>
                <option value="Coelho (10)">Coelho (10)</option>
                <option value="Cavalo (11)">Cavalo (11)</option>
                <option value="Elefante (12)">Elefante (12)</option>
                <option value="Galo (13)">Galo (13)</option>
                <option value="Gato (14)">Gato (14)</option>
                <option value="Jacaré (15)">Jacaré (15)</option>
                <option value="Leão (16)">Leão (16)</option>
                <option value="Macaco (17)">Macaco (17)</option>
                <option value="Porco (18)">Porco (18)</option>
                <option value="Pavão (19)">Pavão (19)</option>
                <option value="Peru (20)">Peru (20)</option>
                <option value="Touro (21)">Touro (21)</option>
                <option value="Tigre (22)">Tigre (22)</option>
                <option value="Urso (23)">Urso (23)</option>
                <option value="Veado (24)">Veado (24)</option>
                <option value="Vaca (25)">Vaca (25)</option>
            </select>
            <div id="puxada-resultado">Puxada: --</div>
        </div>

        <div class="number-grid" id="grid"></div>
        <div id="status-text" style="text-align:center; margin-bottom:10px; font-weight:bold; font-size:0.9rem;">Selecione os números</div>

        <div class="panel">
            <select id="mode" onchange="clearAll();">
                <option value="2-7">Dezena Invertida (7 dezenas -> 21 jogos)</option>
                <option value="2-8">Dezena Invertida (8 dezenas -> 28 jogos)</option>
                <option value="3-6">Centena Invertida (6 dezenas -> 20 jogos)</option>
                <option value="3-7">Centena Invertida (7 dezenas -> 35 jogos)</option>
                <option value="4-7">Milhar Invertida (7 dezenas -> 35 jogos)</option>
                <option value="4-8">Milhar Invertida (8 dezenas -> 70 jogos)</option>
            </select>
            <button id="generateBtn" class="main-btn" onclick="generate()" disabled>GERAR JOGOS</button>
            
            <div id="actionPanel" class="action-buttons">
                <button class="btn-copy" onclick="copyToClipboard()">📋 COPIAR JOGOS</button>
                <button class="btn-whatsapp" onclick="shareWhatsapp()">📲 WHATSAPP</button>
            </div>

            <div style="border-top: 1px solid #ddd; padding-top: 10px; margin-top: 5px;">
                <input type="text" id="drawResult" placeholder="Conferidor Azul (ex: 1,2,3)" oninput="checkGames()">
                <button class="btn-clear" onclick="clearAll()">🗑️ LIMPAR TUDO</button>
            </div>
        </div>

        <div id="results-container"></div>
    </div>
</div>

<script>
    let selectedNumbers = [];
    let currentGames = [];
    
    // Simulação de Contador Online
    function updateOnlineCounter() {
        const hour = new Date().getHours();
        let base;
        if (hour >= 0 && hour < 6) base = 40 + Math.floor(Math.random() * 30);
        else if (hour >= 6 && hour < 12) base = 150 + Math.floor(Math.random() * 100);
        else if (hour >= 12 && hour < 18) base = 300 + Math.floor(Math.random() * 200);
        else base = 200 + Math.floor(Math.random() * 150);
        
        document.getElementById('user-count').innerText = base;
        setTimeout(updateOnlineCounter, 5000 + Math.random() * 5000);
    }

    const puxadas = {
        "Avestruz (1)": "Vaca, Águia, Pavão", "Águia (2)": "Coelho, Peru, Galo", "Burro (3)": "Cavalo, Elefante, Veado",
        "Borboleta (4)": "Cabra, Gato, Leão", "Cachorro (5)": "Galo, Camelo, Macaco", "Cabra (6)": "Touro, Carneiro, Urso",
        "Carneiro (7)": "Cabra, Coelho, Jacaré", "Camelo (8)": "Cachorro, Elefante, Urso", "Cobra (9)": "Jacaré, Porco, Gato",
        "Coelho (10)": "Águia, Carneiro, Burro", "Cavalo (11)": "Burro, Touro, Cabra", "Elefante (12)": "Burro, Camelo, Tigre",
        "Galo (13)": "Cachorro, Pavão, Águia", "Gato (14)": "Cobra, Borboleta, Leão", "Jacaré (15)": "Cobra, Porco, Carneiro",
        "Leão (16)": "Gato, Tigre, Elefante", "Macaco (17)": "Cachorro, Carneiro, Veado", "Porco (18)": "Cobra, Jacaré, Vaca",
        "Pavão (19)": "Avestruz, Galo, Coelho", "Peru (20)": "Águia, Pavão, Veado", "Touro (21)": "Vaca, Cabra, Cavalo",
        "Tigre (22)": "Leão, Gato, Touro", "Urso (23)": "Elefante, Camelo, Cabra", "Veado (24)": "Burro, Macaco, Peru",
        "Vaca (25)": "Touro, Avestruz, Porco"
    };

    function verPuxada() {
        const sel = document.getElementById('bichoAnterior').value;
        document.getElementById('puxada-resultado').innerText = sel ? `Puxada: ${puxadas[sel]}` : "Puxada: --";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        if(now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) initPalpites();
    }

    function initPalpites() {
        const data = new Date();
        const seed = data.getDate() + data.getMonth() + data.getFullYear();
        let random = seed;
        function getNext() { random = (random * 9301 + 49297) % 233280; return random / 233280; }
        document.getElementById('palpites-milhar').innerHTML = "M: " + Array(5).fill(0).map(() => `<span class="sug-item">${Math.floor(getNext()*10000).toString().padStart(4,'0')}</span>`).join('');
        document.getElementById('palpites-centena').innerHTML = "C: " + Array(5).fill(0).map(() => `<span class="sug-item">${Math.floor(getNext()*1000).toString().padStart(3,'0')}</span>`).join('');
    }

    const grid = document.getElementById('grid');
    for (let i = 0; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.innerText = i; btn.className = 'num-btn';
        btn.onclick = () => {
            const idx = selectedNumbers.indexOf(i);
            const [k, nReq] = document.getElementById('mode').value.split('-').map(Number);
            if (idx > -1) { selectedNumbers.splice(idx, 1); btn.classList.remove('active'); }
            else if (selectedNumbers.length < nReq) { selectedNumbers.push(i); btn.classList.add('active'); }
            updateStatus();
        };
        grid.appendChild(btn);
    }

    function updateStatus() {
        const [k, nReq] = document.getElementById('mode').value.split('-').map(Number);
        document.getElementById('status-text').innerText = `Selecionados: ${selectedNumbers.length} / ${nReq}`;
        document.getElementById('generateBtn').disabled = selectedNumbers.length !== nReq;
    }

    function generate() {
        const [k, n] = document.getElementById('mode').value.split('-').map(Number);
        const sorted = [...selectedNumbers].sort((a, b) => a - b);
        currentGames = [];
        function combine(start, combo) {
            if (combo.length === k) { currentGames.push([...combo]); return; }
            for (let i = start; i < sorted.length; i++) { combo.push(sorted[i]); combine(i + 1, combo); combo.pop(); }
        }
        combine(0, []);
        document.getElementById('results-container').innerHTML = currentGames.map((g, i) => `<div class="ticket" id="game-${i}"><small>#${i+1}</small><br>${g.join('-')}</div>`).join('');
        document.getElementById('actionPanel').style.display = 'flex';
    }

    function checkGames() {
        const draw = document.getElementById('drawResult').value.split(/[,.-]/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        currentGames.forEach((game, i) => {
            const hits = game.filter(num => draw.includes(num)).length;
            document.getElementById(`game-${i}`).className = (hits >= game.length && draw.length >= game.length) ? 'ticket ganhador' : 'ticket';
        });
    }

    function copyToClipboard() {
        let text = `FECHAMENTOS DO GUINHO\n\n` + currentGames.map((g, i) => `Jogo ${i+1}: ${g.join('-')}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert("Jogos copiados!"));
    }

    function shareWhatsapp() {
        let text = `*FECHAMENTOS DO GUINHO*\n\n` + currentGames.map((g, i) => `Jogo ${i+1}: ${g.join('-')}`).join('\n');
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function clearAll() {
        selectedNumbers = []; currentGames = [];
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('actionPanel').style.display = 'none';
        document.getElementById('drawResult').value = '';
        document.getElementById('bichoAnterior').value = '';
        document.getElementById('puxada-resultado').innerText = "Puxada: --";
        updateStatus();
    }

    setInterval(updateClock, 1000);
    initPalpites();
    updateOnlineCounter();
</script>
</body>
</html>
