<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fechamentos Do Guinho</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --whatsapp: #25D366;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --win-blue: #007bff;
            --gold: #f1c40f;
            --mercadopago: #009ee3;
            --bichostar: #1e3799;
            /* Cores Dinâmicas */
            --bg-body: #e9ecef;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --input-bg: #ffffff;
            --border-color: #ddd;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --light: #2d2d2d;
            --input-bg: #333333;
            --border-color: #444;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; transition: 0.3s; }
        .main-card { background: var(--bg-card); width: 100%; max-width: 600px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: relative; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        
        /* Botão Sol/Lua */
        .theme-btn {
            position: absolute; right: 10px; top: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--gold);
            color: var(--gold); border-radius: 50%; width: 35px; height: 35px;
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
        }

        .online-counter { font-size: 0.75rem; color: #a5d6a7; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background-color: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .content { padding: 15px; }
        
        .action-links { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 20px; }
        .btn-link { 
            text-decoration: none; padding: 12px 20px; border-radius: 50px; 
            font-weight: bold; font-size: 0.85rem; display: inline-flex; 
            align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            width: 90%; justify-content: center; transition: transform 0.2s;
        }
        .btn-link:active { transform: scale(0.98); }
        .btn-donate { background: var(--mercadopago); color: white; }
        .btn-banca { background: var(--bichostar); color: white; border: 2px solid var(--gold); }

        .suggestions-panel { 
            background: linear-gradient(135deg, #2c3e50, #4ca1af); 
            color: white; padding: 15px 10px; border-radius: 10px; margin-bottom: 20px; 
            text-align: center; border: 2px solid var(--gold);
        }
        
        .datetime-container { background: rgba(0,0,0,0.2); display: inline-block; padding: 8px 20px; border-radius: 15px; margin-bottom: 10px; }
        .date-display { display: block; font-size: 0.85rem; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .clock-display { display: block; font-family: monospace; font-size: 1.3rem; color: var(--gold); font-weight: bold; }
        
        .suggestion-container { display: flex; justify-content: space-around; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .group-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; padding: 8px; flex: 1; min-width: 100px; text-align: center; }
        .group-icon { font-size: 1.8rem; display: block; margin-bottom: 3px; }
        .group-name { font-weight: bold; color: var(--gold); font-size: 0.75rem; display: block; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); white-space: nowrap; }
        .milhar-list { font-family: monospace; font-size: 0.85rem; line-height: 1.3; color: #fff; font-weight: bold; }
        .milhar-item { display: block; letter-spacing: 0.5px; }

        .puxada-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        [data-theme="dark"] .puxada-panel { background: #332b00; border-color: #665500; }
        .puxada-panel select { background: var(--input-bg); color: var(--text-main); margin-top: 5px; width: 100%; padding: 8px; border-radius: 5px; border: 1px solid var(--border-color); }
        #puxada-resultado { font-weight: bold; color: #856404; margin-top: 8px; font-size: 0.9rem; text-align: center; }
        [data-theme="dark"] #puxada-resultado { color: #ffeeba; }

        .number-grid { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .num-btn { 
            width: 45px; height: 45px; border: 2px solid var(--border-color); border-radius: 8px; 
            background: var(--input-bg); color: var(--text-main); font-size: 1.1rem; font-weight: bold; cursor: pointer; 
        }
        .num-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        .panel { background: var(--light); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        select, input, button.main-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 1rem; width: 100%; box-sizing: border-box; background: var(--input-bg); color: var(--text-main); }
        button.main-btn { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.main-btn:disabled { background: #bdc3c7; color: #666; }
        
        .action-buttons { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-whatsapp { background: var(--whatsapp); color: white !important; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy { background: #6c757d; color: white !important; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-clear { background: var(--danger); color: white !important; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 0.9rem; width: 100%; }

        #results-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 20px; }
        .ticket { background: var(--input-bg); border: 1px solid var(--border-color); padding: 10px; text-align: center; border-radius: 8px; font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .ticket.ganhador { background: var(--win-blue) !important; color: white !important; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌗</button>
        <h1>Fechamentos Do Guinho</h1>
        <div class="online-counter">
            <span class="dot"></span> <span id="user-count">Carregando...</span> pessoas online agora
        </div>
    </div>

    <div class="content">
        <div class="action-links">
            <a href="https://mpago.la/2Hvokm3" target="_blank" class="btn-link btn-donate">🤝 MANTER SITE ATIVO (DOAÇÃO)</a>
            <a href="https://bichostars.net/register?ind=8736" target="_blank" class="btn-link btn-banca">🎰 JOGAR AGORA (BANCA ONLINE)</a>
        </div>

        <div class="suggestions-panel">
            <div class="datetime-container">
                <div id="current-date" class="date-display">00/00/0000</div>
                <div id="clock" class="clock-display">00:00:00</div>
            </div>
            <h3 style="font-size:0.75rem; margin: 5px 0;">✨ GRUPOS E MILHARES DO DIA</h3>
            <div id="palpites-container" class="suggestion-container"></div>
        </div>

        <div class="puxada-panel">
            <label style="font-size: 0.8rem; font-weight: bold;">🔎 O QUE DEU? (VER PUXADA):</label>
            <select id="bichoAnterior" onchange="verPuxada()">
                <option value="">Selecione o Bicho...</option>
                <option value="Avestruz (1)">Avestruz (1)</option>
                <option value="Águia (2)">Águia (2)</option>
                <option value="Burro (3)">Burro (3)</option>
                <option value="Borboleta (4)">Borboleta (4)</option>
                <option value="Cachorro (5)">Cachorro (5)</option>
                <option value="Cabra (6)">Cabra (6)</option>
                <option value="Carneiro (7)">Carneiro (7)</option>
                <option value="Camelo (8)">Camelo (8)</option>
                <option value="Cobra (9)">Cobra (9)</option>
                <option value="Coelho (10)">Coelho (10)</option>
                <option value="Cavalo (11)">Cavalo (11)</option>
                <option value="Elefante (12)">Elefante (12)</option>
                <option value="Galo (13)">Galo (13)</option>
                <option value="Gato (14)">Gato (14)</option>
                <option value="Jacaré (15)">Jacaré (15)</option>
                <option value="Leão (16)">Leão (16)</option>
                <option value="Macaco (17)">Macaco (17)</option>
                <option value="Porco (18)">Porco (18)</option>
                <option value="Pavão (19)">Pavão (19)</option>
                <option value="Peru (20)">Peru (20)</option>
                <option value="Touro (21)">Touro (21)</option>
                <option value="Tigre (22)">Tigre (22)</option>
                <option value="Urso (23)">Urso (23)</option>
                <option value="Veado (24)">Veado (24)</option>
                <option value="Vaca (25)">Vaca (25)</option>
            </select>
            <div id="puxada-resultado">Puxada: --</div>
        </div>

        <div class="number-grid" id="grid"></div>
        <div id="status-text" style="text-align:center; margin-bottom:10px; font-weight:bold; font-size:0.9rem;">Selecione os números</div>

        <div class="panel">
            <select id="mode" onchange="clearAll(); renderGrid();">
                <option value="2-7">Dezena Invertida (7 dezenas -> 21 jogos)</option>
                <option value="2-8">Dezena Invertida (8 dezenas -> 28 jogos)</option>
                <option value="3-6">Centena Invertida (6 dezenas -> 20 jogos)</option>
                <option value="3-7">Centena Invertida (7 dezenas -> 35 jogos)</option>
                <option value="4-7">Milhar Invertida (7 dezenas -> 35 jogos)</option>
                <option value="4-8">Milhar Invertida (8 dezenas -> 70 jogos)</option>
                <option value="TG-7">Terno de Grupo (7 grupos -> 35 jogos)</option>
                <option value="TG-8">Terno de Grupo (8 grupos -> 56 jogos)</option>
            </select>
            <button id="generateBtn" class="main-btn" onclick="generate()" disabled>GERAR JOGOS</button>
            
            <div id="actionPanel" class="action-buttons">
                <button class="btn-copy" onclick="copyToClipboard()">📋 COPIAR JOGOS</button>
                <button class="btn-whatsapp" onclick="shareWhatsapp()">📲 WHATSAPP</button>
            </div>

            <div style="border-top: 1px solid #ddd; padding-top: 10px; margin-top: 5px;">
                <input type="text" id="drawResult" placeholder="Conferidor (ex: 1, 17, 25)" oninput="checkGames()">
                <button class="btn-clear" onclick="clearAll()">🗑️ LIMPAR TUDO</button>
            </div>
        </div>

        <div id="results-container"></div>
    </div>
</div>

<script>
    // FUNÇÃO DE TEMA CORRIGIDA
    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        if (isDark) {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    // Inicializar Tema
    if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
    }

    let selectedNumbers = [];
    let currentGames = [];

    const bichosInfo = [
        { n: "01", nome: "Avestruz", icon: "🐦" }, { n: "02", nome: "Águia", icon: "🦅" },
        { n: "03", nome: "Burro", icon: "🫏" }, { n: "04", nome: "Borboleta", icon: "🦋" },
        { n: "05", nome: "Cachorro", icon: "🐶" }, { n: "06", nome: "Cabra", icon: "🐐" },
        { n: "07", nome: "Carneiro", icon: "🐏" }, { n: "08", nome: "Camelo", icon: "🐫" },
        { n: "09", nome: "Cobra", icon: "🐍" }, { n: "10", nome: "Coelho", icon: "🐰" },
        { n: "11", nome: "Cavalo", icon: "🐎" }, { n: "12", nome: "Elefante", icon: "🐘" },
        { n: "13", nome: "Galo", icon: "🐓" }, { n: "14", nome: "Gato", icon: "🐈" },
        { n: "15", nome: "Jacaré", icon: "🐊" }, { n: "16", nome: "Leão", icon: "🦁" },
        { n: "17", nome: "Macaco", icon: "🐒" }, { n: "18", nome: "Porco", icon: "🐷" },
        { n: "19", nome: "Pavão", icon: "🦚" }, { n: "20", nome: "Peru", icon: "🦃" },
        { n: "21", nome: "Touro", icon: "🐂" }, { n: "22", nome: "Tigre", icon: "🐅" },
        { n: "23", nome: "Urso", icon: "🐻" }, { n: "24", nome: "Veado", icon: "🦌" },
        { n: "25", nome: "Vaca", icon: "🐄" }
    ];

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const mode = document.getElementById('mode').value;
        const isTerno = mode.startsWith('TG');
        const start = isTerno ? 1 : 0;
        const max = isTerno ? 25 : 9;

        for (let i = start; i <= max; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = () => {
                const idx = selectedNumbers.indexOf(i);
                const nReq = parseInt(mode.split('-')[1]);
                if (idx > -1) { 
                    selectedNumbers.splice(idx, 1); 
                    btn.classList.remove('active'); 
                } else if (selectedNumbers.length < nReq) { 
                    selectedNumbers.push(i); 
                    btn.classList.add('active'); 
                }
                updateStatus();
            };
            grid.appendChild(btn);
        }
    }

    function updateStatus() {
        const mode = document.getElementById('mode').value;
        const nReq = parseInt(mode.split('-')[1]);
        const label = mode.startsWith('TG') ? 'Grupos' : 'Números';
        document.getElementById('status-text').innerText = `${label} Selecionados: ${selectedNumbers.length} / ${nReq}`;
        document.getElementById('generateBtn').disabled = selectedNumbers.length !== nReq;
    }

    function generate() {
        const mode = document.getElementById('mode').value;
        const k = mode.startsWith('TG') ? 3 : parseInt(mode.split('-')[0]);
        const sorted = [...selectedNumbers].sort((a, b) => a - b);
        currentGames = [];
        function combine(start, combo) {
            if (combo.length === k) { currentGames.push([...combo]); return; }
            for (let i = start; i < sorted.length; i++) { combo.push(sorted[i]); combine(i + 1, combo); combo.pop(); }
        }
        combine(0, []);
        const prefix = mode.startsWith('TG') ? 'Gr.' : '';
        document.getElementById('results-container').innerHTML = currentGames.map((g, i) => `<div class="ticket" id="game-${i}"><small>#${i+1}</small><br>${g.map(n => prefix + n).join('-')}</div>`).join('');
        document.getElementById('actionPanel').style.display = 'flex';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR');
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
    }
    setInterval(updateClock, 1000);

    function verPuxada() {
        const puxadas = { "Avestruz (1)": "Vaca, Águia, Pavão", "Águia (2)": "Coelho, Peru, Galo", "Burro (3)": "Cavalo, Elefante, Veado", "Borboleta (4)": "Cabra, Gato, Leão", "Cachorro (5)": "Galo, Camelo, Macaco", "Cabra (6)": "Touro, Carneiro, Urso", "Carneiro (7)": "Cabra, Coelho, Jacaré", "Camelo (8)": "Cachorro, Elefante, Urso", "Cobra (9)": "Jacaré, Porco, Gato", "Coelho (10)": "Águia, Carneiro, Burro", "Cavalo (11)": "Burro, Touro, Cabra", "Elefante (12)": "Burro, Camelo, Tigre", "Galo (13)": "Cachorro, Pavão, Águia", "Gato (14)": "Cobra, Borboleta, Leão", "Jacaré (15)": "Cobra, Porco, Carneiro", "Leão (16)": "Gato, Tigre, Elefante", "Macaco (17)": "Cachorro, Carneiro, Veado", "Porco (18)": "Cobra, Jacaré, Vaca", "Pavão (19)": "Avestruz, Galo, Coelho", "Peru (20)": "Águia, Pavão, Veado", "Touro (21)": "Vaca, Cabra, Cavalo", "Tigre (22)": "Leão, Gato, Touro", "Urso (23)": "Elefante, Camelo, Cabra", "Veado (24)": "Burro, Macaco, Peru", "Vaca (25)": "Touro, Avestruz, Porco" };
        const sel = document.getElementById('bichoAnterior').value;
        document.getElementById('puxada-resultado').innerText = sel ? `Puxada: ${puxadas[sel]}` : "Puxada: --";
    }

    function checkGames() {
        const drawInput = document.getElementById('drawResult').value;
        const draw = drawInput.split(/[,.-]/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        currentGames.forEach((game, i) => {
            const hits = game.filter(num => draw.includes(num)).length;
            const el = document.getElementById(`game-${i}`);
            if (el) el.className = (hits >= game.length && draw.length >= game.length) ? 'ticket ganhador' : 'ticket';
        });
    }

    function initPalpites() {
        const data = new Date();
        const seed = data.getDate() + (data.getMonth() + 1) * 31 + data.getFullYear();
        let random = seed;
        function getNext() { random = (random * 9301 + 49297) % 233280; return random / 233280; }
        const container = document.getElementById('palpites-container');
        container.innerHTML = "";
        let indices = Array.from({length: 25}, (_, i) => i);
        let selecionados = [];
        for(let i=0; i<3; i++) {
            const idx = Math.floor(getNext() * indices.length);
            selecionados.push(bichosInfo[indices.splice(idx, 1)[0]]);
        }
        selecionados.forEach(bicho => {
            const gNum = parseInt(bicho.n);
            const dezenasBase = [(gNum*4).toString().padStart(2,'0').replace('100','00'), (gNum*4-1).toString().padStart(2,'0'), (gNum*4-2).toString().padStart(2,'0'), (gNum*4-3).toString().padStart(2,'0')];
            let milharesHTML = dezenasBase.map(dez => `<span class="milhar-item">${Math.floor(getNext()*100).toString().padStart(2,'0')}${dez}</span>`).join('');
            container.innerHTML += `<div class="group-card"><span class="group-icon">${bicho.icon}</span><span class="group-name">${bicho.n} - ${bicho.nome}</span><div class="milhar-list">${milharesHTML}</div></div>`;
        });
    }

    function clearAll() {
        selectedNumbers = []; currentGames = [];
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('actionPanel').style.display = 'none';
        document.getElementById('drawResult').value = '';
        updateStatus();
    }

    function copyToClipboard() {
        let text = `FECHAMENTOS DO GUINHO\n\n` + currentGames.map((g, i) => `Jogo ${i+1}: ${g.join('-')}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert("Jogos copiados!"));
    }

    function shareWhatsapp() {
        let text = `*FECHAMENTOS DO GUINHO*\n\n` + currentGames.map((g, i) => `Jogo ${i+1}: ${g.join('-')}`).join('\n');
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function updateOnlineCounter() {
        const el = document.getElementById('user-count');
        if (el) el.innerText = 100 + Math.floor(Math.random() * 50);
        setTimeout(updateOnlineCounter, 8000);
    }

    renderGrid();
    initPalpites();
    updateOnlineCounter();
    updateClock();
</script>
</body>
</html>
