    <meta charset="UTF-8">

    <title>Guinho | Inteligência em Fechamentos</title>
    <style>
        :root {
            /* Paleta Executiva */
            --bg-body: #0f172a; /* Azul Marinho Profundo */
            --bg-card: #1e293b; /* Slate Dark */
            --primary: #38bdf8; /* Azul Sky (Ações) */
            --secondary: #64748b; /* Cinza Médio */
            --success: #10b981; /* Verde Esmeralda */
            --danger: #ef4444; 
            --gold: #f59e0b; /* Dourado para destaques */
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px 10px; 
            display: flex; 
            justify-content: center; 
            line-height: 1.5;
        }

        .main-card { 
            background: var(--bg-card); 
            width: 100%; 
            max-width: 650px; 
            border-radius: 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .header { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 25px 15px; 
            text-align: center; 
            border-bottom: 1px solid var(--border);
        }

        .header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            color: #fff;
        }
        
        .online-counter { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
        }
        .dot { height: 6px; width: 6px; background-color: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--success); }

        .content { padding: 20px; }
        
        /* Banners e Links */
        .vip-banner {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .vip-banner:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .vip-banner h4 { margin: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }

        .btn-link { 
            text-decoration: none; padding: 14px; border-radius: 8px; 
            font-weight: 600; font-size: 0.85rem; display: flex; 
            align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s; border: 1px solid var(--border);
            width: 100%; box-sizing: border-box;
        }

        .btn-donate { background: #009ee3; color: white; margin-bottom: 10px; }
        .btn-banca { background: #1e3a8a; color: white; border-color: var(--primary); }

        /* Painéis de Dados */
        .suggestions-panel { 
            background: rgba(15, 23, 42, 0.5); 
            border-radius: 12px; margin: 20px 0; padding: 15px;
            border: 1px solid var(--border);
        }
        
        .datetime-container { margin-bottom: 15px; }
        .clock-display { font-family: 'Monaco', monospace; font-size: 1.4rem; color: var(--primary); font-weight: bold; }
        
        .group-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 10px; padding: 12px; flex: 1; min-width: 110px;
        }

        .section-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        /* Ferramenta de Grid */
        .num-btn { 
            width: 48px; height: 48px; border: 1px solid var(--border); 
            border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .num-btn:hover { background: rgba(255,255,255,0.1); }
        .num-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .num-btn.fixed { background: var(--gold); color: #000; border-color: var(--gold); }

        select, input { 
            width: 100%; padding: 14px; border-radius: 8px; 
            background: var(--bg-body); border: 1px solid var(--border); 
            color: #fff; font-size: 0.9rem; margin-bottom: 10px;
            box-sizing: border-box;
        }

        .main-btn { 
            background: var(--success); color: #fff; border: none; 
            padding: 16px; border-radius: 8px; font-weight: 700; width: 100%;
            cursor: pointer; transition: filter 0.2s; text-transform: uppercase;
        }
        .main-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .main-btn:hover:not(:disabled) { filter: brightness(1.1); }

        /* Tickets de Resultado */
        .ticket { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            text-align: center; color: var(--primary); font-size: 1rem;
        }
        .ticket.ganhador { background: var(--success) !important; color: #fff !important; border-color: transparent; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }

        .btn-clear { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-whatsapp { background: #25D366; color: #fff; border: none; }

    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>SISTEMA DE FECHAMENTOS</h1>
        <div class="online-counter">
            <span class="dot"></span> <span id="user-count">...</span> usuários processando dados
        </div>
    </div>

    <div class="content">
        <a href="https://wa.me/5581983638967" target="_blank" class="vip-banner">
            <h4>💎 ACESSO À COMUNIDADE VIP</h4>
        </a>

        <div class="action-links" style="margin-bottom: 25px;">
            <a href="https://bichostars.net/register?ind=8736" target="_blank" class="btn-link btn-banca">PLATAFORMA DE JOGOS OFICIAL</a>
            <a href="https://mpago.la/2Hvokm3" target="_blank" class="btn-link" style="color: var(--text-muted); font-size: 0.7rem; border: none;">Manter servidor ativo (Doação)</a>
        </div>

        <div class="suggestions-panel">
            <div class="datetime-container" style="text-align: center;">
                <div id="current-date" style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 5px;">--/--/----</div>

            </div>
            <div class="section-title" style="text-align: center;">Sugestões Algorítmicas do Dia</div>
            <div id="palpites-container" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;"></div>
        </div>

        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border);">
            <div class="section-title">Análise de Tendência (Puxada)</div>
            <select id="bichoAnterior" onchange="verPuxada()">
                <option value="">Selecione o último resultado...</option>
                <option value="Avestruz (1)">Avestruz (1)</option>
                <option value="Águia (2)">Águia (2)</option>
                <option value="Burro (3)">Burro (3)</option>
                <option value="Borboleta (4)">Borboleta (4)</option>
                <option value="Cachorro (5)">Cachorro (5)</option>
                <option value="Cabra (6)">Cabra (6)</option>
                <option value="Carneiro (7)">Carneiro (7)</option>
                <option value="Camelo (8)">Camelo (8)</option>
                <option value="Cobra (9)">Cobra (9)</option>
                <option value="Coelho (10)">Coelho (10)</option>
                <option value="Cavalo (11)">Cavalo (11)</option>
                <option value="Elefante (12)">Elefante (12)</option>
                <option value="Galo (13)">Galo (13)</option>
                <option value="Gato (14)">Gato (14)</option>
                <option value="Jacaré (15)">Jacaré (15)</option>
                <option value="Leão (16)">Leão (16)</option>

                <option value="Porco (18)">Porco (18)</option>

                <option value="Vaca (25)">Vaca (25)</option>
            </select>
            <div id="puxada-resultado" style="text-align: center; color: var(--gold); font-weight: bold; font-size: 0.9rem;">--</div>
        </div>

        <div class="section-title">Configurar Fechamento</div>
        <select id="mode" onchange="clearAll(); renderGrid();">
            <option value="2-7">Dezena Invertida (7 dezenas -> 21 jogos)</option>
            <option value="2-8">Dezena Invertida (8 dezenas -> 28 jogos)</option>
            <option value="3-6">Centena Invertida (6 dezenas -> 20 jogos)</option>
            <option value="3-7">Centena Invertida (7 dezenas -> 35 jogos)</option>
            <option value="3-8">Centena Invertida (8 dezenas -> 56 jogos)</option>
            <option value="3F-7">Centena Invertida (1 Fixa + 7 -> 21 jogos)</option>
            <option value="3F-8">Centena Invertida (1 Fixa + 8 -> 28 jogos)</option>
            <option value="4-7">Milhar Invertida (7 dezenas -> 35 jogos)</option>
            <option value="4-8">Milhar Invertida (8 dezenas -> 70 jogos)</option>
            <option value="4F-7">Milhar Invertida (1 Fixa + 7 -> 35 jogos)</option>
            <option value="4F-8">Milhar Invertida (1 Fixa + 8 -> 56 jogos)</option>
            <option value="TG-7">Terno de Grupo (7 grupos -> 35 jogos)</option>
            <option value="TG-8">Terno de Grupo (8 grupos -> 56 jogos)</option>
        </select>

        <div id="grid" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0;"></div>
        <div id="status-text" style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Selecione os parâmetros acima</div>

        <button id="generateBtn" class="main-btn" onclick="generate()" disabled>PROCESSAR COMBINAÇÕES</button>
        
        <div id="actionPanel" style="display:none; flex-direction: column; gap: 10px; margin-top: 15px;">
            <button class="btn-link" style="background: var(--bg-body); color: #fff;" onclick="copyToClipboard()">COPIAR LISTA</button>
            <button class="btn-link btn-whatsapp" onclick="shareWhatsapp()">ENVIAR PARA CAMBISTA</button>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <div class="section-title">Conferidor Instantâneo</div>
            <input type="text" id="drawResult" placeholder="Digite os números sorteados..." oninput="checkGames()">
            <button class="btn-link btn-clear" onclick="clearAll()">REINICIAR FERRAMENTA</button>
        </div>

        <div id="results-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 20px;"></div>
    </div>
</div>

<script>
    /* LÓGICA DE PROGRAMAÇÃO PRESERVADA */
    let selectedNumbers = [];
    let fixedNumber = null;
    let currentGames = [];

    const bichosInfo = [
        { n: "01", nome: "Avestruz", icon: "🐦" }, { n: "02", nome: "Águia", icon: "🦅" },
        { n: "03", nome: "Burro", icon: "🫏" }, { n: "04", nome: "Borboleta", icon: "🦋" },
        { n: "05", nome: "Cachorro", icon: "🐶" }, { n: "06", nome: "Cabra", icon: "🐐" },
        { n: "07", nome: "Carneiro", icon: "🐏" }, { n: "08", nome: "Camelo", icon: "🐫" },
        { n: "09", nome: "Cobra", icon: "🐍" }, { n: "10", nome: "Coelho", icon: "🐰" },
        { n: "11", nome: "Cavalo", icon: "🐎" }, { n: "12", nome: "Elefante", icon: "🐘" },
        { n: "13", nome: "Galo", icon: "🐓" }, { n: "14", nome: "Gato", icon: "🐈" },
        { n: "15", nome: "Jacaré", icon: "🐊" }, { n: "16", nome: "Leão", icon: "🦁" },
        { n: "17", nome: "Macaco", icon: "🐒" }, { n: "18", nome: "Porco", icon: "🐷" },
        { n: "19", nome: "Pavão", icon: "🦚" }, { n: "20", nome: "Peru", icon: "🦃" },
        { n: "21", nome: "Touro", icon: "🐂" }, { n: "22", nome: "Tigre", icon: "🐅" },
        { n: "23", nome: "Urso", icon: "🐻" }, { n: "24", nome: "Veado", icon: "🦌" },
        { n: "25", nome: "Vaca", icon: "🐄" }
    ];

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const mode = document.getElementById('mode').value;
        const isTerno = mode.startsWith('TG');
        const isFixedMode = mode.includes('F');
        const start = isTerno ? 1 : 0;
        const max = isTerno ? 25 : 9;

        for (let i = start; i <= max; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = () => {
                if (isFixedMode && fixedNumber === null && !selectedNumbers.includes(i)) {
                    fixedNumber = i; btn.classList.add('fixed');
                } else {
                    const idx = selectedNumbers.indexOf(i);
                    const nReq = parseInt(mode.split('-')[1]);
                    if (idx > -1) { selectedNumbers.splice(idx, 1); btn.classList.remove('active'); }
                    else if (i === fixedNumber) { fixedNumber = null; btn.classList.remove('fixed'); }
                    else if (selectedNumbers.length < nReq) { selectedNumbers.push(i); btn.classList.add('active'); }
                }
                updateStatus();
            };
            grid.appendChild(btn);
        }
    }

    function updateStatus() {
        const mode = document.getElementById('mode').value;
        const nReq = parseInt(mode.split('-')[1]);
        const isFixedMode = mode.includes('F');
        if (isFixedMode) {
            const fixaStatus = fixedNumber !== null ? 'Fixa Selecionada' : 'Escolha 1 Fixa';
            document.getElementById('status-text').innerText = `${fixaStatus} | ${selectedNumbers.length}/${nReq} Variáveis`;
            document.getElementById('generateBtn').disabled = !(fixedNumber !== null && selectedNumbers.length === nReq);
        } else {
            document.getElementById('status-text').innerText = `Selecionados: ${selectedNumbers.length} de ${nReq}`;
            document.getElementById('generateBtn').disabled = selectedNumbers.length !== nReq;
        }
    }

    function generate() {
        const mode = document.getElementById('mode').value;
        currentGames = [];
        const sorted = [...selectedNumbers].sort((a, b) => a - b);
        if (mode.includes('F')) {
            const targetSize = mode.startsWith('4') ? 3 : 2;
            function combine(start, combo) {
                if (combo.length === targetSize) { currentGames.push([fixedNumber, ...combo].sort((a,b) => a-b)); return; }
                for (let i = start; i < sorted.length; i++) { combo.push(sorted[i]); combine(i + 1, combo); combo.pop(); }
            }
            combine(0, []);
        } else {
            const k = mode.startsWith('TG') ? 3 : parseInt(mode.split('-')[0]);
            function combineGeneric(start, combo) {
                if (combo.length === k) { currentGames.push([...combo]); return; }
                for (let i = start; i < sorted.length; i++) { combo.push(sorted[i]); combineGeneric(i + 1, combo); combo.pop(); }
            }
            combineGeneric(0, []);
        }
        const prefix = mode.startsWith('TG') ? 'G.' : '';
        document.getElementById('results-container').innerHTML = currentGames.map((g, i) => `<div class="ticket" id="game-${i}"><small style="font-size:0.6rem; color:var(--text-muted)">ID ${i+1}</small><br>${g.map(n => prefix + n).join('-')}</div>`).join('');
        document.getElementById('actionPanel').style.display = 'flex';
        document.getElementById('results-container').scrollIntoView({ behavior: 'smooth' });
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
    }
    setInterval(updateClock, 1000);

    function verPuxada() {
        const puxadas = { "Avestruz (1)": "Vaca, Águia, Pavão", "Águia (2)": "Coelho, Peru, Galo", "Burro (3)": "Cavalo, Elefante, Veado", "Borboleta (4)": "Cabra, Gato, Leão", "Cachorro (5)": "Galo, Camelo, Macaco", "Cabra (6)": "Touro, Carneiro, Urso", "Carneiro (7)": "Cabra, Coelho, Jacaré", "Camelo (8)": "Cachorro, Elefante, Urso", "Cobra (9)": "Jacaré, Porco, Gato", "Coelho (10)": "Águia, Carneiro, Burro", "Cavalo (11)": "Burro, Touro, Cabra", "Elefante (12)": "Burro, Camelo, Tigre", "Galo (13)": "Cachorro, Pavão, Águia", "Gato (14)": "Cobra, Borboleta, Leão", "Jacaré (15)": "Cobra, Porco, Carneiro", "Leão (16)": "Gato, Tigre, Elefante", "Macaco (17)": "Cachorro, Carneiro, Veado", "Porco (18)": "Cobra, Jacaré, Vaca", "Pavão (19)": "Avestruz, Galo, Coelho", "Peru (20)": "Águia, Pavão, Veado", "Touro (21)": "Vaca, Cabra, Cavalo", "Tigre (22)": "Leão, Gato, Touro", "Urso (23)": "Elefante, Camelo, Cabra", "Veado (24)": "Burro, Macaco, Peru", "Vaca (25)": "Touro, Avestruz, Porco" };
        const sel = document.getElementById('bichoAnterior').value;
        document.getElementById('puxada-resultado').innerText = sel ? `Sugestão: ${puxadas[sel]}` : "--";
    }

    function checkGames() {
        const draw = document.getElementById('drawResult').value.split(/[,.-]/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        currentGames.forEach((game, i) => {
            const hits = game.filter(num => draw.includes(num)).length;
            document.getElementById(`game-${i}`).className = (hits >= game.length && draw.length >= game.length) ? 'ticket ganhador' : 'ticket';
        });
    }

    function initPalpites() {
        const data = new Date();
        const seed = data.getDate() + (data.getMonth() + 1) * 31 + data.getFullYear();
        let random = seed;
        function getNext() { random = (random * 9301 + 49297) % 233280; return random / 233280; }
        const container = document.getElementById('palpites-container');
        container.innerHTML = "";
        let indices = Array.from({length: 25}, (_, i) => i);
        let selecionados = [];
        for(let i=0; i<3; i++) {
            const idx = Math.floor(getNext() * indices.length);
            selecionados.push(bichosInfo[indices.splice(idx, 1)[0]]);
        }
        selecionados.forEach(bicho => {
            const gNum = parseInt(bicho.n);
            const dezenasBase = [(gNum*4).toString().padStart(2,'0').replace('100','00'), (gNum*4-1).toString().padStart(2,'0'), (gNum*4-2).toString().padStart(2,'0'), (gNum*4-3).toString().padStart(2,'0')];
            let milharesHTML = dezenasBase.map(dez => `<span style="display:block; font-size:0.8rem;">${Math.floor(getNext()*100).toString().padStart(2,'0')}${dez}</span>`).join('');
            container.innerHTML += `<div class="group-card"><span style="font-size:1.5rem">${bicho.icon}</span><div style="font-weight:700; color:var(--primary); margin:5px 0;">${bicho.n}</div><div style="font-family:monospace">${milharesHTML}</div></div>`;
        });
    }

    function clearAll() {
        selectedNumbers = []; fixedNumber = null; currentGames = [];
        document.querySelectorAll('.num-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('fixed'); });
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('actionPanel').style.display = 'none';
        document.getElementById('drawResult').value = '';
        updateStatus();
    }

    function copyToClipboard() {
        let text = `GUINHO FECHAMENTOS\n\n` + currentGames.map((g, i) => `Jogo ${i+1}: ${g.join('-')}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert("Copiado para a área de transferência."));
    }

    function shareWhatsapp() {
        const modeName = document.getElementById('mode').options[document.getElementById('mode').selectedIndex].text.split('(')[0].trim();
        let text = `*FECHAMENTO PROFISSIONAL*\n\n`;
        text += `*Modalidade:* ${modeName}\n`;
        text += `*Jogos:*\n`;
        text += currentGames.map((g, i) => `${i+1}: ${g.join('-')}`).join('\n');
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function updateOnlineCounter() {
        document.getElementById('user-count').innerText = 150 + Math.floor(Math.random() * 80);
        setTimeout(updateOnlineCounter, 10000);
    }

    window.onload = () => {
        renderGrid();
        initPalpites();
        updateOnlineCounter();
        updateClock();
    };
</script>
</body>
</html>
